<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#5a3fd4"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#ring)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Monitor icon -->
  <g transform="translate(256, 220)">
    <rect x="-56" y="-44" width="112" height="80" rx="8" fill="white" opacity="0.15"/>
    <rect x="-50" y="-38" width="100" height="68" rx="4" fill="white"/>
    <!-- Screen glow -->
    <rect x="-46" y="-34" width="92" height="58" rx="3" fill="#7c5cff" opacity="0.08"/>
    <!-- Install/download arrow on screen -->
    <path d="M256 205 L256 260 M240 248 L256 264 L272 248" stroke="#7c5cff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(-256, -220)"/>
    <line x1="232" y1="272" x2="280" y2="272" stroke="#7c5cff" stroke-width="4" stroke-linecap="round" transform="translate(-256, -220)"/>
    <line x1="232" y1="280" x2="280" y2="280" stroke="#7c5cff" stroke-width="4" stroke-linecap="round" transform="translate(-256, -220)"/>
  </g>
  <!-- Stand -->
  <rect x="236" y="272" width="40" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="246" y="280" width="20" height="14" rx="2" fill="white" opacity="0.25"/>
  <!-- Title -->
  <text x="256" y="360" text-anchor="middle" font-size="28" font-weight="800" fill="white" font-family="system-ui, sans-serif" letter-spacing="-0.5">
    OS Install
  </text>
  <text x="256" y="385" text-anchor="middle" font-size="15" font-weight="600" fill="rgba(255,255,255,0.6)" font-family="system-ui, sans-serif" letter-spacing="4">
    SIMULATOR
  </text>
  <!-- USB icon bottom-left -->
  <g transform="translate(85, 400)" opacity="0.4">
    <rect x="-8" y="-16" width="16" height="32" rx="3" fill="white" stroke="white" stroke-width="0.5"/>
    <rect x="-4" y="-22" width="8" height="8" rx="1" fill="white"/>
    <circle cx="0" cy="-6" r="2" fill="#22c55e"/>
  </g>
  <!-- Boot icon bottom-right -->
  <g transform="translate(427, 400)" opacity="0.4">
    <circle cx="0" cy="0" r="16" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M-5 -8 L8 0 L-5 8 Z" fill="white"/>
  </g>
</svg>
