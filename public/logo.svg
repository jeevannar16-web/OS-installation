<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#4f35c4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Monitor body -->
  <rect x="120" y="100" width="272" height="200" rx="16" fill="white" opacity="0.15"/>
  <rect x="136" y="116" width="240" height="164" rx="10" fill="white"/>
  <!-- Screen content: download icon -->
  <g transform="translate(256, 240)">
    <path d="M0 -40 L0 30 M-18 12 L0 30 L18 12" stroke="#7c5cff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="-40" y="36" width="80" height="8" rx="4" fill="#7c5cff"/>
    <rect x="-40" y="52" width="80" height="8" rx="4" fill="#7c5cff"/>
  </g>
  <!-- Stand -->
  <rect x="216" y="300" width="80" height="16" rx="6" fill="white" opacity="0.4"/>
  <rect x="186" y="316" width="140" height="24" rx="8" fill="white" opacity="0.25"/>
  <!-- USB icon bottom-left -->
  <g transform="translate(120, 380)" opacity="0.35">
    <rect x="-14" y="-28" width="28" height="56" rx="6" fill="white" stroke="white" stroke-width="1.5"/>
    <rect x="-8" y="-38" width="16" height="14" rx="3" fill="white"/>
    <circle cx="0" cy="-10" r="4" fill="#22c55e"/>
  </g>
  <!-- Play/boot icon bottom-right -->
  <g transform="translate(392, 380)" opacity="0.35">
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="3"/>
    <path d="M-10 -16 L16 0 L-10 16 Z" fill="white"/>
  </g>
</svg>
