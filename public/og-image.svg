<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="300" fill="#7c5cff" opacity="0.04"/>
  <circle cx="1000" cy="500" r="250" fill="#06b6d4" opacity="0.04"/>
  <circle cx="600" cy="300" r="200" fill="#a855f7" opacity="0.03"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Orbit ring -->
  <ellipse cx="600" cy="280" rx="280" ry="60" fill="none" stroke="#7c5cff" stroke-width="1.5" opacity="0.15"/>

  <!-- Center install icon -->
  <circle cx="600" cy="260" r="80" fill="#0a0a1a" stroke="url(#accent)" stroke-width="3"/>
  <circle cx="600" cy="260" r="72" fill="#12122a"/>
  <path d="M600 210 L600 290 M576 272 L600 296 L624 272" stroke="#7c5cff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="570" y1="306" x2="630" y2="306" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>

  <!-- Ubuntu (top-left) -->
  <circle cx="320" cy="160" r="44" fill="#E95420" opacity="0.9"/>
  <circle cx="320" cy="160" r="38" fill="#2c001e"/>
  <circle cx="320" cy="146" r="7" fill="#E95420" opacity="0.8"/>
  <circle cx="308" cy="168" r="7" fill="#E95420" opacity="0.8"/>
  <circle cx="332" cy="168" r="7" fill="#E95420" opacity="0.8"/>

  <!-- Windows (top-right) -->
  <rect x="856" y="116" width="70" height="70" rx="6" fill="#0078D4"/>
  <rect x="862" y="122" width="29" height="29" rx="3" fill="white" opacity="0.9"/>
  <rect x="895" y="122" width="29" height="29" rx="3" fill="white" opacity="0.7"/>
  <rect x="862" y="155" width="29" height="29" rx="3" fill="white" opacity="0.7"/>
  <rect x="895" y="155" width="29" height="29" rx="3" fill="white" opacity="0.5"/>

  <!-- Arch (bottom-left) -->
  <circle cx="340" cy="460" r="40" fill="#1793D1" opacity="0.9"/>
  <circle cx="340" cy="460" r="34" fill="#111111"/>
  <path d="M340 434 L322 480 L330 480 L340 456 L350 480 L358 480 Z" fill="#1793D1" opacity="0.8"/>

  <!-- Fedora (bottom-right) -->
  <circle cx="860" cy="460" r="40" fill="#3C6EB4" opacity="0.9"/>
  <circle cx="860" cy="460" r="34" fill="#0d1117"/>
  <text x="860" y="472" text-anchor="middle" font-size="26" font-weight="bold" fill="#3C6EB4" font-family="sans-serif">F</text>

  <!-- Debian (bottom-center) -->
  <circle cx="600" cy="500" r="32" fill="#A80030" opacity="0.9"/>
  <circle cx="600" cy="500" r="26" fill="#101010"/>
  <text x="600" y="510" text-anchor="middle" font-size="20" font-weight="bold" fill="#A80030" font-family="serif">D</text>

  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" font-size="52" font-weight="800" fill="white" font-family="system-ui, sans-serif">
    OS Install Simulator
  </text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-size="22" fill="#a0a0c0" font-family="system-ui, sans-serif">
    Practice installing Ubuntu, Windows, Arch Linux &amp; more
  </text>

  <!-- Features -->
  <text x="600" y="456" text-anchor="middle" font-size="16" fill="#7c5cff" font-family="system-ui, sans-serif" letter-spacing="2">
    VIRTUAL MACHINE  ·  DUAL BOOT  ·  LIVE USB  ·  20+ SCENES  ·  100% FREE
  </text>

  <!-- URL -->
  <rect x="430" y="560" width="340" height="36" rx="18" fill="white" opacity="0.08"/>
  <text x="600" y="584" text-anchor="middle" font-size="15" fill="#7c5cff" font-family="monospace">
    os-installation.vercel.app
  </text>
</svg>
